<section class="section hero">
  <div class="container">
    <div class="hero-grid">
      <h1 class="hero-title js-anim" data-anim="animate__fadeInLeft">
        <span class="muted">{{ site.data.home.hero.kicker }}</span><br />
        <span class="accent">{{ site.data.home.hero.title_emphasis }}</span>
      </h1>

      <p class="hero-text js-anim" data-anim="animate__fadeIn">{{ site.data.home.hero.text }}</p>

      <div class="hero-actions js-anim" data-anim="animate__fadeIn" data-once="true">
        <a class="btn btn-primary" href="{{ site.data.home.hero.primary_btn_link }}">
          {{ site.data.home.hero.primary_btn }}
        </a>
        <a class="btn btn-secondary" href="{{ site.data.home.hero.secondary_btn_link }}">
          {{ site.data.home.hero.secondary_btn }}
        </a>
      </div>
    </div>
  </div>
</section>
