  image: "/assets/img/about/dennis.webp"
  image_alt: "Dummy-Portrait als Platzhalter"
  primary_btn: "Mehr über Matthias"
  primary_btn_link: "/ueber-mich/"
  items:
    - title: "Analyse statt Aktionismus"
      text: "Zuerst Transparenz über Ist-Situation, Risiken und Abhängigkeiten, danach priorisierte Maßnahmenplanung."
