    - title: "Entscheidungsorientierte Kommunikation"
      text: "Ergebnisse werden so aufbereitet, dass Management und Fachbereiche sicher entscheiden können."
      icon: "/assets/icons/lucide/train.svg"
    - title: "Umsetzung in großen Organisationen"
