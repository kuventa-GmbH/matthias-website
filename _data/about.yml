intro:
  title: "Matthias Kühnlein – IT Security Consultant für Governance, Compliance und Umsetzung"
  text: "Matthias Kühnlein begleitet Unternehmen seit vielen Jahren an der Schnittstelle von Informationssicherheit, Regulatorik und operativer Umsetzung. Sein Schwerpunkt liegt auf Mandaten, in denen technische Security-Themen und organisatorische Steuerung zusammengeführt werden müssen."
  text2: "In Konzern- und Auditkontexten unterstützt er Verantwortliche dabei, Risiken transparent zu machen, Anforderungen verständlich aufzubereiten und Maßnahmen so zu steuern, dass sie im Tagesgeschäft tatsächlich greifen."
  button_text: "Leistungsprofil ansehen"
  button_link: "/leistungen/"
  button_download: false

